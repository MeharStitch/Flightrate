name: Daily Blog Post Generator

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC = 7:00 AM PKT — before social post goes out
  workflow_dispatch:        # manual trigger

jobs:
  generate:
    name: Generate & Publish Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node blog/generate-post.mjs

      - name: Commit new post
        run: |
          git config user.name  "FlightRate Blog Bot"
          git config user.email "bot@flightrate.pk"
          git add blog-content/ blog/topics-queue.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "blog: auto-publish $(date +%Y-%m-%d) post"
          git push

      # Vercel auto-deploys on push — new blog page goes live in ~60s

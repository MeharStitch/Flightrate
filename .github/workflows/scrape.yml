name: FlightRate Price Scraper

on:
  schedule:
    - cron: '0 21 * * *'   # 02:00 AM PKT (UTC+5) — full run all routes
    - cron: '0 3 * * *'    # 08:00 AM PKT — top routes refresh
    - cron: '0 9 * * *'    # 02:00 PM PKT — top routes refresh
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type: full or top'
        required: false
        default: 'full'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation warnings

# ── Job 1: Determine run type ──────────────────────────────────────────────────
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      run_type: ${{ steps.rt.outputs.type }}
    steps:
      - id: rt
        name: Determine run type
        run: |
          INPUT="${{ github.event.inputs.run_type }}"
          HOUR=$(date -u +%-H)
          if [ -n "$INPUT" ]; then
            echo "type=$INPUT" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -eq 21 ]; then
            echo "type=full" >> $GITHUB_OUTPUT
          else
            echo "type=top" >> $GITHUB_OUTPUT
          fi

# ── Shared proxy + scraper setup (reused by all 4 chunks) ─────────────────────
  scrape-a:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Setup proxy
        run: |
          curl -fsSL https://github.com/go-gost/gost/releases/download/v3.0.0/gost_3.0.0_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin gost
          chmod +x /usr/local/bin/gost
          gost -L "socks5://:1080" \
               -F "socks5://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:1080" \
               > /tmp/gost.log 2>&1 &
          sleep 3
          curl --socks5 localhost:1080 https://ipv4.webshare.io/ --max-time 10 || echo "Proxy test failed — running without proxy"
      - name: Run scraper (chunk A)
        run: |
          if [ "${{ needs.setup.outputs.run_type }}" = "full" ]; then
            npx ts-node --project tsconfig.scraper.json scraper/index.ts full --chunk a
          else
            npx ts-node --project tsconfig.scraper.json scraper/index.ts top
          fi
        env:
          PROXY_HOST:           localhost
          PROXY_PORT:           '1080'
          PROXY_USER:           ''
          PROXY_PASS:           ''
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          SITE_URL:             https://www.flightrate.pk
          REVALIDATE_SECRET:    ${{ secrets.REVALIDATE_SECRET }}

  scrape-b:
    needs: setup
    if: needs.setup.outputs.run_type == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Setup proxy
        run: |
          curl -fsSL https://github.com/go-gost/gost/releases/download/v3.0.0/gost_3.0.0_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin gost
          chmod +x /usr/local/bin/gost
          gost -L "socks5://:1080" \
               -F "socks5://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:1080" \
               > /tmp/gost.log 2>&1 &
          sleep 3
          curl --socks5 localhost:1080 https://ipv4.webshare.io/ --max-time 10 || echo "Proxy test failed — running without proxy"
      - name: Run scraper (chunk B)
        run: npx ts-node --project tsconfig.scraper.json scraper/index.ts full --chunk b
        env:
          PROXY_HOST:           localhost
          PROXY_PORT:           '1080'
          PROXY_USER:           ''
          PROXY_PASS:           ''
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          SITE_URL:             https://www.flightrate.pk
          REVALIDATE_SECRET:    ${{ secrets.REVALIDATE_SECRET }}

  scrape-c:
    needs: setup
    if: needs.setup.outputs.run_type == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Setup proxy
        run: |
          curl -fsSL https://github.com/go-gost/gost/releases/download/v3.0.0/gost_3.0.0_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin gost
          chmod +x /usr/local/bin/gost
          gost -L "socks5://:1080" \
               -F "socks5://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:1080" \
               > /tmp/gost.log 2>&1 &
          sleep 3
          curl --socks5 localhost:1080 https://ipv4.webshare.io/ --max-time 10 || echo "Proxy test failed — running without proxy"
      - name: Run scraper (chunk C)
        run: npx ts-node --project tsconfig.scraper.json scraper/index.ts full --chunk c
        env:
          PROXY_HOST:           localhost
          PROXY_PORT:           '1080'
          PROXY_USER:           ''
          PROXY_PASS:           ''
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          SITE_URL:             https://www.flightrate.pk
          REVALIDATE_SECRET:    ${{ secrets.REVALIDATE_SECRET }}

  scrape-d:
    needs: setup
    if: needs.setup.outputs.run_type == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Setup proxy
        run: |
          curl -fsSL https://github.com/go-gost/gost/releases/download/v3.0.0/gost_3.0.0_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin gost
          chmod +x /usr/local/bin/gost
          gost -L "socks5://:1080" \
               -F "socks5://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:1080" \
               > /tmp/gost.log 2>&1 &
          sleep 3
          curl --socks5 localhost:1080 https://ipv4.webshare.io/ --max-time 10 || echo "Proxy test failed — running without proxy"
      - name: Run scraper (chunk D)
        run: npx ts-node --project tsconfig.scraper.json scraper/index.ts full --chunk d
        env:
          PROXY_HOST:           localhost
          PROXY_PORT:           '1080'
          PROXY_USER:           ''
          PROXY_PASS:           ''
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          SITE_URL:             https://www.flightrate.pk
          REVALIDATE_SECRET:    ${{ secrets.REVALIDATE_SECRET }}

# ── Notify after all 4 jobs complete ──────────────────────────────────────────
  notify:
    needs: [setup, scrape-a, scrape-b, scrape-c, scrape-d]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          A="${{ needs.scrape-a.result }}"
          B="${{ needs.scrape-b.result }}"
          C="${{ needs.scrape-c.result }}"
          D="${{ needs.scrape-d.result }}"
          TYPE="${{ needs.setup.outputs.run_type }}"

          ALL_OK=true
          [ "$A" != "success" ] && ALL_OK=false
          [ "$B" != "success" ] && [ "$B" != "skipped" ] && ALL_OK=false
          [ "$C" != "success" ] && [ "$C" != "skipped" ] && ALL_OK=false
          [ "$D" != "success" ] && [ "$D" != "skipped" ] && ALL_OK=false

          if [ "$ALL_OK" = "true" ]; then
            curl -s -X POST https://ntfy.sh/flightrate-scraper \
              -H "Title: ✅ Scraper Done ($TYPE)" \
              -H "Priority: default" \
              -H "Tags: white_check_mark" \
              -d "A=$A B=$B C=$C D=$D | 212 routes | $(date -u '+%d %b %H:%M UTC')" || true
          else
            curl -s -X POST https://ntfy.sh/flightrate-scraper \
              -H "Title: ❌ Scraper FAILED ($TYPE)" \
              -H "Priority: high" \
              -H "Tags: x,rotating_light" \
              -d "A=$A B=$B C=$C D=$D | Check GitHub Actions logs" || true
          fi

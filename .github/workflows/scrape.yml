name: FlightRate Price Scraper

on:
  schedule:
    - cron: '0 21 * * *'   # 02:00 AM PKT (UTC+5) — full run all routes
    - cron: '0 3 * * *'    # 08:00 AM PKT — top routes refresh
    - cron: '0 9 * * *'    # 02:00 PM PKT — top routes refresh
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type: full or top'
        required: false
        default: 'full'

# ── Job 1: Determine run type (shared between A and B) ─────────────────────────
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      run_type: ${{ steps.rt.outputs.type }}
    steps:
      - id: rt
        name: Determine run type
        run: |
          INPUT="${{ github.event.inputs.run_type }}"
          HOUR=$(date -u +%-H)
          if [ -n "$INPUT" ]; then
            echo "type=$INPUT" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -eq 21 ]; then
            echo "type=full" >> $GITHUB_OUTPUT
          else
            echo "type=top" >> $GITHUB_OUTPUT
          fi

# ── Shared step template (used by both scrape jobs) ────────────────────────────
  scrape-a:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Setup proxy bridge (gost)
        run: |
          curl -fsSL https://github.com/go-gost/gost/releases/download/v3.0.0/gost_3.0.0_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin gost
          chmod +x /usr/local/bin/gost
          gost -L "socks5://:1080" \
               -F "socks5://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:1080" \
               > /tmp/gost.log 2>&1 &
          sleep 3
          curl --socks5 localhost:1080 https://ipv4.webshare.io/ --max-time 10 || echo "Proxy test failed — will run without proxy"

      - name: Run scraper (chunk A)
        run: |
          TYPE="${{ needs.setup.outputs.run_type }}"
          if [ "$TYPE" = "full" ]; then
            npx ts-node --project tsconfig.scraper.json scraper/index.ts full --chunk a
          else
            npx ts-node --project tsconfig.scraper.json scraper/index.ts top
          fi
        env:
          PROXY_HOST:            localhost
          PROXY_PORT:            '1080'
          PROXY_USER:            ''
          PROXY_PASS:            ''
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
          SITE_URL:              https://www.flightrate.pk
          REVALIDATE_SECRET:     ${{ secrets.REVALIDATE_SECRET }}

  scrape-b:
    needs: setup
    # Only run chunk B for full runs — top runs are small enough for one job
    if: needs.setup.outputs.run_type == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Setup proxy bridge (gost)
        run: |
          curl -fsSL https://github.com/go-gost/gost/releases/download/v3.0.0/gost_3.0.0_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin gost
          chmod +x /usr/local/bin/gost
          gost -L "socks5://:1080" \
               -F "socks5://${{ secrets.PROXY_USER }}:${{ secrets.PROXY_PASS }}@${{ secrets.PROXY_HOST }}:1080" \
               > /tmp/gost.log 2>&1 &
          sleep 3
          curl --socks5 localhost:1080 https://ipv4.webshare.io/ --max-time 10 || echo "Proxy test failed — will run without proxy"

      - name: Run scraper (chunk B)
        run: npx ts-node --project tsconfig.scraper.json scraper/index.ts full --chunk b
        env:
          PROXY_HOST:            localhost
          PROXY_PORT:            '1080'
          PROXY_USER:            ''
          PROXY_PASS:            ''
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
          SITE_URL:              https://www.flightrate.pk
          REVALIDATE_SECRET:     ${{ secrets.REVALIDATE_SECRET }}

# ── Job 4: Notify after both jobs complete ─────────────────────────────────────
  notify:
    needs: [setup, scrape-a, scrape-b]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          A="${{ needs.scrape-a.result }}"
          B="${{ needs.scrape-b.result }}"
          TYPE="${{ needs.setup.outputs.run_type }}"

          if [ "$A" = "success" ] && ([ "$B" = "success" ] || [ "$B" = "skipped" ]); then
            curl -s -X POST https://ntfy.sh/flightrate-scraper \
              -H "Title: ✅ Scraper Done ($TYPE)" \
              -H "Priority: default" \
              -H "Tags: white_check_mark" \
              -d "Both chunks complete | $(date -u '+%d %b %H:%M UTC')" || true
          else
            curl -s -X POST https://ntfy.sh/flightrate-scraper \
              -H "Title: ❌ Scraper FAILED ($TYPE)" \
              -H "Priority: high" \
              -H "Tags: x,rotating_light" \
              -d "A=$A B=$B | Check GitHub Actions logs" || true
          fi

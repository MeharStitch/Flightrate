name: FlightRate Price Scraper

on:
  schedule:
    - cron: '0 21 * * *'   # 02:00 AM PKT (UTC+5) — full run all routes
    - cron: '0 3 * * *'    # 08:00 AM PKT — top routes refresh
    - cron: '0 9 * * *'    # 02:00 PM PKT — top routes refresh
  workflow_dispatch:        # allow manual trigger from GitHub UI
    inputs:
      run_type:
        description: 'Run type: full or top'
        required: false
        default: 'full'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Determine run type
        id: run_type
        run: |
          HOUR=$(date -u +%-H)
          INPUT="${{ github.event.inputs.run_type }}"
          if [ -n "$INPUT" ]; then
            echo "type=$INPUT" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -eq 21 ]; then
            echo "type=full" >> $GITHUB_OUTPUT
          else
            echo "type=top" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        run: npx ts-node --project tsconfig.scraper.json scraper/index.ts ${{ steps.run_type.outputs.type }}
        env:
          PROXY_HOST:           ${{ secrets.PROXY_HOST }}
          PROXY_PORT:           ${{ secrets.PROXY_PORT }}
          PROXY_USER:           ${{ secrets.PROXY_USER }}
          PROXY_PASS:           ${{ secrets.PROXY_PASS }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⚠️ FlightRate scraper FAILED — check GitHub Actions" || true
